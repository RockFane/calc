<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计算器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
            overflow-x: hidden;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }
        .main-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
            align-items: stretch;
            width: 100%;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #fff;
            font-size: 2rem;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }
        .form-section {
            background: rgba(255,255,255,0.98);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            position: relative;
            width: 100%;
            max-width: 100%;
        }
        .decorative-flower {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 80px;
            height: 80px;
            opacity: 0.6;
            pointer-events: none;
        }
        .form-section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .table-section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .form-row {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .form-group > label {
            margin-bottom: 8px;
        }
        .form-group .el-radio-group {
            position: relative;
            margin-bottom: 8px;
        }
        .form-group label {
            position: relative;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input,
        .form-group span,
        .form-group select {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #fff;
        }
        .form-group input {
            color: #333;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }
        /* Element UI Radio Group Styles */
        .el-radio-group {
            display: inline-block;
            vertical-align: middle;
        }
        .el-radio-button {
            position: relative;
            display: inline-block;
        }
        .el-radio-button input[type="radio"] {
            display: none;
        }
        .el-radio-button__inner {
            display: inline-block;
            line-height: 1;
            white-space: nowrap;
            vertical-align: middle;
            background: #fff;
            border: 2px solid #dcdfe6;
            border-left: 0;
            color: #606266;
            -webkit-appearance: none;
            text-align: center;
            box-sizing: border-box;
            outline: none;
            margin: 0;
            position: relative;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.645, 0.045, 0.355, 1);
            padding: 12px 20px;
            font-size: 14px;
            border-radius: 0 8px 8px 0;
            min-width: 50px;
            font-weight: 600;
        }
        .el-radio-button:first-child .el-radio-button__inner {
            border-left: 2px solid #dcdfe6;
            border-radius: 8px 0 0 8px;
        }
        .el-radio-button:nth-of-type(2) .el-radio-button__inner {
            border-radius: 0 8px 8px 0;
        }
        .el-radio-button:last-child .el-radio-button__inner {
            border-radius: 0 8px 8px 0;
        }
        .el-radio-button:hover .el-radio-button__inner {
            color: #667eea;
        }
        .el-radio-button input[type="radio"]:checked + .el-radio-button__inner {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border-color: #667eea;
        }
        .el-radio-button__inner:hover {
            color: #667eea;
        }
        .form-group select {
            cursor: pointer;
            color: #333;
        }
        /* Custom Select Styles */
        .custom-select {
            position: relative;
            width: 100%;
        }
        .custom-select-selected {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: #fff;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        .custom-select-selected:hover {
            border-color: #aaa;
        }
        .custom-select-selected.active {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }
        .custom-select-arrow {
            font-size: 10px;
            color: #999;
            transition: transform 0.2s;
        }
        .custom-select-arrow.open {
            transform: rotate(180deg);
        }
        .custom-select-options {
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            right: 0;
            max-height: 200px;
            overflow-y: auto;
            background: #fff;
            border: 2px solid #667eea;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.2);
            z-index: 1000;
            display: none;
        }
        .custom-select-options.show {
            display: block;
        }
        .custom-select-option {
            padding: 10px 15px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .custom-select-option:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
        }
        .custom-select-option.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .custom-select-options::-webkit-scrollbar {
            width: 6px;
        }
        .custom-select-options::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        .custom-select-options::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
        }
        .form-group input:hover,
        .form-group span:hover {
            border-color: #aaa;
        }
        /* Element UI Select Styles */
        .el-select {
            position: relative;
            width: 100%;
        }
        .el-select-input {
            width: 100%;
            padding: 12px 35px 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #fff;
            color: #333;
            cursor: pointer;
        }
        .el-select-input:hover {
            border-color: #aaa;
        }
        .el-select-input.active {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }
        .el-select-arrow {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            color: #999;
            cursor: pointer;
            transition: transform 0.2s;
            font-style: normal;
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            background: none !important;
            padding: 0 !important;
            margin: 0 !important;
        }
        .el-select-arrow.open {
            transform: translateY(-50%) rotate(180deg);
        }
        .el-select-dropdown {
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            right: 0;
            max-height: 200px;
            overflow-y: auto;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 1000;
            display: none;
            padding: 5px 0;
        }
        .el-select-dropdown.show {
            display: block;
        }
        .el-select-option {
            padding: 8px 15px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            color: #333;
        }
        .el-select-option:hover {
            background: #f5f7fa;
        }
        .el-select-option.selected {
            color: #667eea;
            font-weight: 600;
            background: rgba(102, 126, 234, 0.1);
        }
        .el-select-dropdown::-webkit-scrollbar {
            width: 6px;
        }
        .el-select-dropdown::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .el-select-dropdown::-webkit-scrollbar-thumb {
            background: #c0c4cc;
            border-radius: 3px;
        }
        .el-select-dropdown::-webkit-scrollbar-thumb:hover {
            background: #909399;
        }
        #budgetPrice {
            font-weight: 600;
            color: #667eea;
            min-height: 46px;
            display: flex;
            align-items: center;
            pointer-events: none;
        }
        #strikeList {
            padding: 0;
            min-height: 240px;
            background: transparent;
            border: none;
            line-height: 2;
            font-size: 13px;
            text-align: left;
        }
        .strike-list-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 100%;
        }
        .strike-list-container.calculator-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        .record-card-item.strike-list-item {
            flex-direction: column;
        }
        .strike-column {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border: 2px solid #dee2e6;
            border-radius: 8px;
            padding: 12px 15px;
            min-height: 400px;
            width: 100%;
            max-width: 100%;
            overflow-x: auto;
        }
        .strike-column-header {
            font-size: 14px;
            font-weight: 700;
            color: #666;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #dee2e6;
            text-align: center;
        }
        .strike-column-header.call {
            border-bottom-color: #dc3545;
            color: #dc3545;
        }
        .strike-column-header.put {
            border-bottom-color: #28a745;
            color: #28a745;
        }
        .strike-column .change-info {
            font-size: 12px;
            text-align: center;
            margin-bottom: 10px;
            padding: 4px 8px;
            background: rgba(0,0,0,0.05);
            border-radius: 4px;
        }
        .strike-column .change-info.call {
            color: #dc3545;
        }
        .strike-column .change-info.put {
            color: #28a745;
        }
        .form-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        .form-buttons .btn {
            padding: 8px 16px;
            font-size: 12px;
        }
        #strikeList p {
            margin: 0;
            padding: 2px 0;
        }
        #strikeList span {
            display: inline-block !important;
        }
        #strikeList .strike-item {
            display: flex !important;
            align-items: center !important;
            gap: 10px !important;
            max-width: 100% !important;
            overflow-wrap: break-word;
        }
        #strikeList .strike-item-highlight {
            display: flex !important;
            align-items: center !important;
            gap: 10px !important;
        }
        #strikeList .strike-price {
            display: inline-block !important;
            text-align: center !important;
            font-weight: 700 !important;
            background: rgba(102, 126, 234, 0.08) !important;
            padding: 4px 10px !important;
            border-radius: 6px !important;
            min-width: 80px !important;
            pointer-events: none;
        }
        #strikeList .strike-item-highlight .strike-price {
            color: #fff !important;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3) !important;
        }
        #strikeList .sl-alert-box {
            display: inline-block !important;
            padding: 4px 10px !important;
            background: rgba(0,0,0,0.05) !important;
            border-radius: 4px !important;
            font-size: 11px !important;
            font-weight: 500 !important;
            color: #666 !important;
            pointer-events: none;
            white-space: nowrap !important;
        }
        #strikeList .sl-alert-box .alert-text {
            color: #f59e0b !important;
            margin-right: 8px !important;
        }
        #strikeList .sl-alert-box .stoploss-text {
            color: #dc3545 !important;
        }
        #strikeList .sl-alert-box .change-badge {
            display: inline-block !important;
            margin: 0 8px !important;
            padding: 2px 6px !important;
            border-radius: 3px !important;
            font-size: 10px !important;
            font-weight: 600 !important;
            white-space: nowrap !important;
        }
        #strikeList .sl-alert-box .change-badge.change-positive {
            color: #d32f2f !important;
            background: rgba(211, 47, 31, 0.1) !important;
        }
        #strikeList .sl-alert-box .change-badge.change-negative {
            color: #388e3c !important;
            background: rgba(56, 142, 60, 0.1) !important;
        }
        #strikeList .sl-alert-box .strike-change {
            margin-left: 8px !important;
            margin-right: 8px !important;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        .btn-primary:active {
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);

        .btn-secondary:hover {

        .btn-export {

        .record-card-value.strike-list p {

        .record-card-value.strike-list p + p {

        .record-card-value.strike-list .strike-item {

            align-items: center !important;
            gap: 8px !important;
            background: rgba(102, 126, 234, 0.08) !important;

            border-radius: 4px !important;
            pointer-events: none;
            line-height: 1.6 !important;
        }
        .record-card-value.strike-list .strike-item-highlight {
            display: inline-flex !important;
            align-items: center !important;
            gap: 8px !important;
            padding: 4px 8px !important;
            border-radius: 4px !important;
            pointer-events: none;
            line-height: 1.6 !important;

        .record-card-value.strike-list .sl-alert-box {
            font-weight: bold;
            font-size: 10px !important;
            color: #666 !important;
            background: rgba(0,0,0,0.05) !important;
            padding: 2px 6px !important;
            border-radius: 3px !important;
            white-space: nowrap !important;
        }
        .record-card-value.strike-list .strike-item-highlight .sl-alert-box {
            color: #eee !important;
            background: rgba(255,255,255,0.15) !important;
        }
        .record-card-value.strike-list .strike-item-highlight .strike-price {
            color: #eee !important;
        }
        .record-card-value.strike-list .sl-alert-box .alert-text {
            color: #f59e0b !important;
            margin-right: 8px !important;
        }
        .record-card-value.strike-list .sl-alert-box .stoploss-text {
            color: #dc3545 !important;
        }
        .record-card-value.strike-list .strike-item-highlight .sl-alert-box .alert-text {
            color: #fbbf24 !important;
        }
        .record-card-value.strike-list .strike-item-highlight .sl-alert-box .stoploss-text {
            color: #fca5a5 !important;
        }
        .record-card-value.strike-list .sl-alert-box .change-badge {
            display: inline-block !important;
            margin: 0 4px !important;
            padding: 2px 6px !important;
            border-radius: 3px !important;
            font-size: 9px !important;
            font-weight: 600 !important;
            white-space: nowrap !important;
        }
        .record-card-value.strike-list .sl-alert-box .change-badge.change-positive {
            color: #d32f2f !important;
            background: rgba(211, 47, 31, 0.15) !important;
        }
        .record-card-value.strike-list .sl-alert-box .change-badge.change-negative {
            color: #388e3c !important;
            background: rgba(56, 142, 60, 0.15) !important;
        }
        .record-card-value.strike-list .strike-item-highlight .sl-alert-box .change-badge.change-positive {
            color: #ffcdd2 !important;
            background: rgba(211, 47, 31, 0.3) !important;
        }
        .record-card-value.strike-list .strike-item-highlight .sl-alert-box .change-badge.change-negative {
            color: #c8e6c9 !important;
            background: rgba(56, 142, 60, 0.3) !important;
        }
        .strike-highlight {
            display: inline-block !important;
            text-align: center;
            min-width: 60px;
            font-weight: 700 !important;
            color: #fff !important;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
            padding: 4px 10px !important;
            border-radius: 6px !important;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3) !important;
            pointer-events: none;
        }
        .record-card-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 6px;
        }
        .record-card-apply {
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .record-card-apply:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }
        .record-card-delete {
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            background: linear-gradient(135deg, #e53935 0%, #c62828 100%);
            color: #fff;
        }
        .record-card-delete:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(229, 57, 53, 0.4);
        }
        @media (max-width: 768px) {
            .record-card-body {
                flex-direction: column;
            }
        }
        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 14px;
        }
        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        /* Responsive */
        @media (max-width: 1200px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 768px) {
            body {
                padding: 15px 12px;
            }
            h1 {
                font-size: 1.5rem;
                margin-bottom: 20px;
            }
            .form-section {
                padding: 20px 15px;
            }
            .table-section {
                padding: 20px 15px;
            }
            .form-section-title,
            .table-section-title {
                font-size: 1rem;
                margin-bottom: 15px;
            }
            .form-group label {
                font-size: 12px;
            }
            .form-group input,
            .form-group select {
                padding: 10px 12px;
                font-size: 13px;
            }
            .form-buttons {
                position: static;
                display: flex;
                justify-content: flex-end;
                margin-top: 15px;
            }
            .form-buttons .btn {
                padding: 8px 16px;
                font-size: 12px;
            }
            .decorative-flower {
                display: none;
            }
            .table-section-actions {
                position: static;
                flex-wrap: wrap;
                gap: 8px;
                margin-bottom: 15px;
            }
            .table-section-actions .btn {
                padding: 6px 12px;
                font-size: 11px;
            }
            .record-card {
                padding: 12px;
            }
            .record-card-label {
                font-size: 11px;
            }
            .record-card-value {
                font-size: 12px;
            }
            .strike-column {
                padding: 10px;
                min-height: auto;
            }
            .strike-column-header {
                font-size: 12px;
            }
            .strike-price {
                min-width: 60px !important;
                font-size: 12px !important;
            }
            .sl-alert-box {
                font-size: 10px !important;
                padding: 3px 6px !important;
            }
            .option-badge {
                width: 40px;
                height: 40px;
                font-size: 8px !important;
            }
            /* 计算器列举单在移动端改为上下布局 */
            .strike-list-container.calculator-layout {
                grid-template-columns: 1fr !important;
            }
            .strike-column {
                min-height: auto !important;
                padding: 10px !important;
                border-width: 1px !important;
            }
            /* 移动端减小 strike-price 最小宽度 */
            .strike-column .strike-price {
                min-width: 50px !important;
                padding: 3px 6px !important;
                font-size: 11px !important;
            }
            /* 移动端 sl-alert-box 换行 */
            .strike-column .sl-alert-box {
                white-space: normal !important;
                display: flex !important;
                flex-wrap: wrap !important;
                align-items: center !important;
                gap: 4px !important;
            }
            /* 移动端调整 strike-item 布局 */
            .strike-column .strike-item,
            .strike-column .strike-item-highlight {
                flex-wrap: wrap !important;
                justify-content: center !important;
            }
            .strike-column .sl-alert-box .alert-text,
            .strike-column .sl-alert-box .stoploss-text {
                margin-right: 4px !important;
            }
            .strike-column .sl-alert-box .change-badge {
                margin: 0 4px !important;
                padding: 1px 4px !important;
                font-size: 9px !important;
            }
        }

        /* Notification styles */
        .notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
        }
        .notification {
            min-width: 300px;
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .notification-icon {
            font-size: 20px;
        }
        .notification-message {
            flex: 1;
            font-size: 14px;
            color: #333;
        }
        .notification-success {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            border-left: 4px solid #28a745;
        }
        .notification-error {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            border-left: 4px solid #dc3545;
        }
        .notification-warning {
            background: linear-gradient(135deg, #fff3cd 0%, #ffeaa7 100%);
            border-left: 4px solid #ffc107;
        }
        .notification-info {
            background: linear-gradient(135deg, #d1ecf1 0%, #bee5eb 100%);
            border-left: 4px solid #17a2b8;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .notification-hide {
            animation: slideOut 0.3s ease forwards;
        }
        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        /* Popconfirm styles */
        .popconfirm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 9998;
        }
        .popconfirm {
            position: absolute;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            padding: 15px;
            min-width: 250px;
            z-index: 9999;
            animation: popIn 0.2s ease;
        }
        .popconfirm-arrow {
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            transform: rotate(45deg);
            top: -5px;
            left: 50%;
            margin-left: -5px;
            box-shadow: -2px -2px 4px rgba(0,0,0,0.1);
        }
        .popconfirm-content {
            font-size: 14px;
            color: #333;
            margin-bottom: 15px;
        }
        .popconfirm-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .popconfirm-btn {
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .popconfirm-btn-cancel {
            background: #f0f0f0;
            color: #666;
        }
        .popconfirm-btn-cancel:hover {
            background: #e0e0e0;
        }
        .popconfirm-btn-confirm {
            background: linear-gradient(135deg, #e53935 0%, #c62828 100%);
            color: white;
        }
        .popconfirm-btn-confirm:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(229, 57, 53, 0.4);
        }
        @keyframes popIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>计算器</h1>

        <div class="main-layout">
            <div class="form-section">
                <div class="form-section-title">计算器</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>昨收价</label>
                        <input type="number" id="prevClose" step="any" placeholder="">
                    </div>
                    <div class="form-group">
                        <label>预测涨跌幅 (%)</label>
                        <input type="number" id="predictChange" step="any" placeholder="" value="2">
                    </div>
                    <div class="form-group">
                        <label>行权价间隔</label>
                        <div class="el-select" id="strikeIntervalSelect">
                            <input type="text" class="el-select-input" readonly onclick="toggleStrikeDropdown()" id="strikeIntervalDisplay" value="8">
                            <i class="el-select-arrow" onclick="toggleStrikeDropdown()">▼</i>
                            <div class="el-select-dropdown" id="strikeIntervalDropdown">
                            </div>
                        </div>
                        <input type="hidden" id="strikeInterval" value="8">
                    </div>
                    <div class="form-group">
                        <label>列举单</label>
                        <span id="strikeList">-</span>
                    </div>
                </div>
                <div class="form-buttons">
                    <button class="btn btn-save" onclick="saveRecord()">保存</button>
                </div>
                <canvas id="flowerCanvas" class="decorative-flower"></canvas>
            </div>

            <div class="table-section">
                <div class="table-section-actions">
                    <button class="btn btn-export" onclick="exportData()">导出 JSON</button>
                    <button class="btn btn-import" onclick="document.getElementById('importFile').click()">导入 JSON</button>
                    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
                </div>
                <div class="table-section-title">保存记录</div>
                <div class="record-list" id="recordList">
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Container -->
    <div class="notification-container" id="notificationContainer"></div>

    <script src="app.js"></script>
</body>
</html>
